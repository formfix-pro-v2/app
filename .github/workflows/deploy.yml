name: FormFix Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    # Ovo je ključno: govori GitHub-u da uđe u "app" folder pre izvršavanja komandi
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # Cache ubrzava build, ali mu treba tačna putanja do lock fajla
          cache: 'npm'
          cache-dependency-path: ./app/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      # Ovde bi išao tvoj deploy korak (npr. za Vercel, Firebase ili GitHub Pages)
      # Ako imaš specifičnu platformu gde šalješ kod, dodaj taj korak ispod.
