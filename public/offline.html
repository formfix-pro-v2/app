<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veronica Method — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #fffaf8 0%, #fff5f7 50%, #fdf7f3 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #4a3f44;
    }
    .card {
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(240,227,232,0.5);
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 400px;
      text-align: center;
      backdrop-filter: blur(12px);
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 28px; margin-bottom: 8px; font-weight: 600; }
    p { color: #7b6870; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: linear-gradient(135deg, #d8a7b5, #c9929f);
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { transform: scale(0.98); }
    .tip { font-size: 12px; color: #b98fa1; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry — your progress is saved locally.</p>
    <button onclick="window.location.reload()">Try Again</button>
    <p class="tip">Tip: Your last viewed exercises and meals are still available in your browser cache.</p>
  </div>
</body>
</html>
